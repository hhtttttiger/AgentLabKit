[project]
name = "agentlabkit-llm-gateway"
version = "0.1.0"
description = "LLM model gateway — routing, load balancing, credential resolution"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.10.0",
  "pydantic-settings>=2.7.0",
  "openai>=1.68.0",
  "websockets>=15.0.1",
  "sqlalchemy[asyncio]>=2.0.0",
  "asyncpg>=0.30.0",
  "cryptography>=43.0.0",
  "anthropic>=0.39.0",
  "agentlabkit-db>=0.1.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0",
  "pytest-asyncio>=0.24.0",
  "httpx>=0.28.0",
]
redis = [
  "redis[hiredis]>=5.0.0",
]

[build-system]
requires = ["setuptools>=69.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
